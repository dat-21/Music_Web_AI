name: CI Pipeline

on:
  - push
  - pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Poetry and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-py311-${{ hashFiles('pyproject.toml', 'poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-py311-

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry poetry-plugin-export

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run lint checks
        run: poetry run ruff check src tests

      - name: Run tests with coverage
        run: poetry run pytest --cov=src --cov-report=term-missing tests/

      - name: Security scan with Bandit
        run: poetry run bandit -r src -q

      - name: Docker build test
        run: docker build -t ai-search:latest .
